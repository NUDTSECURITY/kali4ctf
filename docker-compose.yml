services:
  kali-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        KALI_MIRROR: https://mirrors.tuna.tsinghua.edu.cn/kali
    image: kali-mcp:latest
    container_name: kali-mcp
    ports:
      - "5000:5000"
    volumes:
      - ./workspace:/workspace
    environment:
      - DEBIAN_FRONTEND=noninteractive
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
